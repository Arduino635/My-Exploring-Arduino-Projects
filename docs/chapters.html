                        status: "completed",
                        description: "Connect to cloud services and fetch data from web APIs.",
                        video: "https://www.youtube.com/post/UgkxvhTs0TzN3T6Y9rMQih1jMn10atsQtq2a",
                        troubleshooting: [
                            "Ensure everything is soldered on correctly and securely.",
                            "Double-check the API endpoint, API key, and HTTP vs HTTPS requirements.",
                            "If parsing fails, print and inspect the raw JSON response before extracting fields."
                        ],
                        featured: false
                    }
                ],
                tutorial: "https://www.exploringarduino.com/content2/ch17/"
            }
        ];

        function renderChapters() {
            const container = document.getElementById('chaptersContainer');
            container.innerHTML = '';

            chapters.forEach(chapter => {
                const chapterEl = document.createElement('div');
                chapterEl.className = 'chapter';
                
                let projectsHtml = '';
                if (chapter.projects.length > 0) {
                    projectsHtml = '<div class="projects-in-chapter"><h5>📌 Projects:</h5>';
                    chapter.projects.forEach(project => {
                        const statusClass = project.status === 'completed' ? 'status-completed' : 'status-planned';
                        const badge = project.featured ? '<span class="featured-badge">⭐ FEATURED</span>' : '';
                        const videoLink = project.video ? `<a href="${project.video}" target="_blank" class="tutorial-link">📹 Watch on YouTube</a>` : '';
                        const imageEntries = [
                            { src: project.image, alt: project.imageAlt || project.name },
                            { src: project.image2, alt: project.imageAlt2 || `${project.name} photo` }
                        ].filter(entry => entry.src);
                        const projectImage = imageEntries
                            .map(entry => `<div class="project-image"><img src="${entry.src}" alt="${entry.alt}" loading="lazy"></div>`)
                            .join('');
                        let troubleshootingHtml = '';
                        if (project.troubleshooting && project.troubleshooting.length > 0) {
                            troubleshootingHtml = '<div class="project-troubleshooting"><h6>Troubleshooting</h6><ul>';
                            project.troubleshooting.forEach(item => {
                                troubleshootingHtml += `<li>• ${item}</li>`;
                            });
                            troubleshootingHtml += '</ul></div>';
                        }
                        projectsHtml += `
                            <div class="project-item ${project.status}">
                                <div style="flex: 1;">
                                    <div class="project-name">${project.name}${badge}</div>
                                    <div class="project-description">${project.description}</div>
                                    ${projectImage}
                                    ${troubleshootingHtml}
                                    ${videoLink}
                                </div>
                                <span class="project-status ${statusClass}">${project.status === 'completed' ? '✓' : '○'}</span>
                            </div>
                        `;
                    });
                    projectsHtml += '</div>';
                }

                let partsHtml = '';
                if (chapter.parts.length > 0) {
                    partsHtml = '<div class="parts-list"><h4>📦 Parts List:</h4><ul>';
                    chapter.parts.forEach(part => {
                        partsHtml += `<li>${part}</li>`;
                    });
                    partsHtml += '</ul></div>';
                }

                let chapterTroubleshootingHtml = '';
                if (chapter.troubleshooting && chapter.troubleshooting.length > 0) {
                    chapterTroubleshootingHtml = '<div class="project-troubleshooting"><h6>Troubleshooting</h6><ul>';
                    chapter.troubleshooting.forEach(item => {
                        chapterTroubleshootingHtml += `<li>• ${item}</li>`;
                    });
                    chapterTroubleshootingHtml += '</ul></div>';
                }

                let tutorialHtml = '';
                if (chapter.tutorial) {
                    tutorialHtml = `<a href="${chapter.tutorial}" target="_blank" class="tutorial-link">📺 View Tutorial</a>`;
                }

                chapterEl.innerHTML = `
                    <div class="chapter-header" onclick="toggleChapter(this)">
                        <div>
                            <span class="chapter-number">Chapter ${chapter.number}</span>
                            <h3 style="display: inline-block; margin-left: 15px;">${chapter.title}</h3>
                        </div>
                        <span class="toggle-icon">▼</span>
                    </div>
                    <div class="chapter-content">
                        <p class="chapter-description">${chapter.description}</p>
                        ${partsHtml}
                        ${chapterTroubleshootingHtml}
                        ${projectsHtml}
                        ${tutorialHtml}
                    </div>
                `;
                
                container.appendChild(chapterEl);
            });
        }

        function toggleChapter(headerEl) {
            const chapter = headerEl.closest('.chapter');
            chapter.classList.toggle('expanded');
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', renderChapters);
    </script>
</body>
</html>
